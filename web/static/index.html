<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Trading Journal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root {
  --bg: #070a0f;
  --bg2: #0d1117;
  --bg3: #161b22;
  --bg4: #1c2128;
  --border: #21262d;
  --border2: #30363d;
  --blue: #58a6ff;
  --blue-dim: #1f3a5f;
  --green: #3fb950;
  --green-dim: #1a3c2b;
  --red: #f85149;
  --red-dim: #3d1f1f;
  --yellow: #d29922;
  --yellow-dim: #2d2008;
  --purple: #bc8cff;
  --text: #e6edf3;
  --text2: #8b949e;
  --text3: #484f58;
  --radius: 8px;
  --radius-lg: 12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── Layout ── */
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;min-height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px}
.page{flex:1;overflow-y:auto;padding:24px;background:var(--bg)}

/* ── Sidebar ── */
.sidebar-logo{padding:18px 16px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.sidebar-logo .logo-icon{font-size:22px}
.sidebar-logo .logo-text{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-0.3px}
.sidebar-logo .logo-sub{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
.nav-section{padding:10px 8px 4px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);padding-left:16px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 14px;margin:1px 8px;border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:13px;transition:all .15s;user-select:none}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--blue-dim);color:var(--blue);font-weight:500}
.nav-item .icon{width:16px;text-align:center;font-size:14px;flex-shrink:0}
.sidebar-bottom{margin-top:auto;padding:12px;border-top:1px solid var(--border)}
.user-info{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius)}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--blue-dim);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.user-email{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout-btn{margin-top:6px;width:100%;background:none;border:1px solid var(--border2);color:var(--text2);padding:6px;border-radius:var(--radius);cursor:pointer;font-size:12px;transition:all .15s}
.logout-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--text3)}

/* ── Topbar ── */
.topbar-title{font-size:15px;font-weight:600;color:var(--text)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-dot.alive{background:var(--green);box-shadow:0 0 6px var(--green)}
.status-dot.dead{background:var(--red)}
.status-dot.unknown{background:var(--text3)}
.status-label{font-size:12px;color:var(--text2)}
.refresh-btn{background:none;border:1px solid var(--border2);color:var(--text2);padding:4px 10px;border-radius:var(--radius);cursor:pointer;font-size:12px}
.refresh-btn:hover{background:var(--bg3);color:var(--text)}

/* ── Cards ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px}
.card-title{font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);font-weight:500;margin-bottom:14px}
.card + .card{margin-top:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:1200px){.grid4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.grid3,.grid2{grid-template-columns:1fr}}

/* ── Stat boxes ── */
.stat-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:700;color:var(--text);letter-spacing:-0.5px}
.stat-sub{font-size:11px;color:var(--text2);margin-top:4px}
.stat-value.green{color:var(--green)}
.stat-value.red{color:var(--red)}
.stat-value.blue{color:var(--blue)}
.stat-value.yellow{color:var(--yellow)}

/* ── Regime badge ── */
.regime-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;letter-spacing:.3px}
.regime-BULL_TREND,.regime-bull_trend{background:var(--green-dim);color:var(--green);border:1px solid #2ea043}
.regime-BEAR_TREND,.regime-bear_trend{background:var(--red-dim);color:var(--red);border:1px solid #da3633}
.regime-BEAR_CHOP,.regime-bear_chop{background:var(--yellow-dim);color:var(--yellow);border:1px solid #9e6a03}
.regime-BULL_CHOP,.regime-bull_chop{background:#1c2f1e;color:#56d364;border:1px solid #3fb950}
.regime-NEUTRAL,.regime-neutral,.regime-UNKNOWN,.regime-unknown{background:var(--bg4);color:var(--text2);border:1px solid var(--border2)}

/* ── Tables ── */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg3);color:var(--text3);padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;position:sticky;top:0;z-index:1}
td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:hover td{background:var(--bg3)}
tr:last-child td{border-bottom:none}

/* ── Badges ── */
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.badge-long{background:var(--green-dim);color:var(--green)}
.badge-short{background:var(--red-dim);color:var(--red)}
.badge-ok{background:var(--green-dim);color:var(--green)}
.badge-warn{background:var(--yellow-dim);color:var(--yellow)}
.badge-dead{background:var(--red-dim);color:var(--red)}
.badge-off{background:var(--bg4);color:var(--text3)}

/* ── P&L coloring ── */
.pos{color:var(--green)}
.neg{color:var(--red)}
.dim{color:var(--text3)}

/* ── Sparkline inline ── */
.sparkline-wrap canvas{display:block}

/* ── Pagination ── */
.pager{display:flex;align-items:center;gap:8px;padding-top:14px;justify-content:flex-end;border-top:1px solid var(--border);margin-top:14px}
.pager-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);cursor:pointer;padding:5px 12px;border-radius:var(--radius);font-size:12px}
.pager-btn:hover:not(:disabled){background:var(--bg4);color:var(--text)}
.pager-btn:disabled{opacity:.35;cursor:not-allowed}
.pager-info{font-size:12px;color:var(--text3)}

/* ── Filters ── */
.filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.filter-input{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:7px 12px;border-radius:var(--radius);font-size:13px;outline:none;transition:border-color .15s}
.filter-input::placeholder{color:var(--text3)}
.filter-input:focus{border-color:var(--blue)}
select.filter-input option{background:var(--bg3)}

/* ── Loading & empty ── */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text3);font-size:13px;flex-direction:column;gap:12px}
.spinner{width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;color:var(--text3);padding:40px;font-size:13px}

/* ── Auth ── */
.auth-bg{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px}
.auth-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:380px}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo .icon{font-size:40px}
.auth-logo h1{font-size:22px;font-weight:700;margin-top:10px;color:var(--text)}
.auth-logo p{font-size:13px;color:var(--text2);margin-top:4px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500}
.field input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:10px 14px;border-radius:var(--radius);font-size:14px;outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--blue)}
.field input::placeholder{color:var(--text3)}
.auth-btn{width:100%;background:var(--blue);border:none;color:#fff;padding:11px;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;transition:opacity .15s}
.auth-btn:hover{opacity:.85}
.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.err-box{background:var(--red-dim);border:1px solid #da3633;color:var(--red);border-radius:var(--radius);padding:10px 14px;font-size:13px;margin-bottom:16px}
.totp-hint{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:14px;margin-bottom:18px;text-align:center}
.totp-hint .big{font-size:32px;margin-bottom:8px}
.totp-hint p{font-size:13px;color:var(--text2);line-height:1.6}
.totp-hint strong{color:var(--text)}
.totp-code{font-size:32px;letter-spacing:12px;text-align:center;background:var(--bg3);border:1px solid var(--border2);color:var(--text);width:100%;padding:14px;border-radius:var(--radius);outline:none;font-family:monospace;transition:border-color .15s}
.totp-code:focus{border-color:var(--blue)}

/* ── Strategy card ── */
.strat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.strat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:default;transition:border-color .15s}
.strat-card:hover{border-color:var(--border2)}
.strat-name{font-size:13px;font-weight:600;color:var(--blue);margin-bottom:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.strat-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text2);margin-bottom:5px}
.strat-row .val{font-size:12px;font-weight:500;color:var(--text)}

/* ── Regime detail ── */
.sleeve-row{display:grid;grid-template-columns:180px 60px 60px 60px 60px auto;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.sleeve-row:last-child{border-bottom:none}
.sleeve-name{color:var(--text);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mult-cell{text-align:center;border-radius:4px;padding:2px 0}
.mult-on{background:rgba(63,185,80,.15);color:var(--green);font-weight:600}
.mult-off{color:var(--text3)}
.sleeve-hdr{color:var(--text3);font-weight:500;text-align:center;font-size:10px;text-transform:uppercase;letter-spacing:.5px}

/* ── Journal ── */
.journal-item{padding:16px 0;border-bottom:1px solid var(--border)}
.journal-item:last-child{border-bottom:none}
.journal-date{font-size:12px;color:var(--blue);font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.journal-date::before{content:'';display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--blue);flex-shrink:0}
.journal-body{font-size:12px;color:var(--text2);white-space:pre-wrap;line-height:1.7;font-family:inherit;max-height:300px;overflow:hidden;position:relative}
.journal-body.expanded{max-height:none}
.journal-expand{background:none;border:none;color:var(--blue);font-size:12px;cursor:pointer;margin-top:6px;padding:0}
.journal-expand:hover{text-decoration:underline}

/* ── Alpaca ── */
.pick-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px}
.pick-ticker{font-size:20px;font-weight:700;color:var(--text);margin-bottom:2px}
.pick-month{font-size:11px;color:var(--text3);margin-bottom:12px}
.pick-metric{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:5px}
.pick-metric .v{color:var(--text);font-weight:500}
.pick-entry{background:var(--bg4);border-radius:var(--radius);padding:8px 10px;margin-top:10px;font-size:11px;color:var(--text3)}
.pick-entry span{color:var(--text);font-weight:500}

/* ── Chart container ── */
.chart-wrap{position:relative;height:220px;width:100%}

/* ── Progress bar ── */
.progress-bar{height:4px;background:var(--bg4);border-radius:2px;margin-top:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .4s}

/* ── Scrollable table container ── */
.tbl-scroll{max-height:420px;overflow-y:auto}

/* ── Section headers ── */
.section-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:18px;display:flex;align-items:center;gap:10px}
.section-sub{font-size:12px;color:var(--text3);font-weight:400;margin-left:4px}

/* ── Pulse animation for live dot ── */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulse{animation:pulse 2s ease-in-out infinite}

/* ── Info row ── */
.info-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);padding:5px 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-row .label{width:180px;flex-shrink:0;font-size:12px;color:var(--text3)}
.info-row .value{color:var(--text)}

/* ── Page header ── */
.page-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
</style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ── API ────────────────────────────────────────────────────────────────────

async function api(path, opts = {}) {
  const r = await fetch(path, { credentials: 'include', ...opts });
  if (r.status === 401) throw Object.assign(new Error('Unauthorized'), { status: 401 });
  if (!r.ok) { const b = await r.json().catch(() => ({})); throw new Error(b.detail || `HTTP ${r.status}`); }
  return r.json();
}
const post = (path, body) => api(path, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });

// ── Sparkline via Canvas ───────────────────────────────────────────────────

function Sparkline({ data, color = '#3fb950', width = 80, height = 32 }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !data || data.length < 2) return;
    const ctx = ref.current.getContext('2d');
    const W = width, H = height;
    ctx.clearRect(0, 0, W, H);
    const min = Math.min(...data), max = Math.max(...data);
    const range = max - min || 1;
    const pts = data.map((v, i) => [i / (data.length - 1) * W, H - ((v - min) / range) * (H - 4) - 2]);
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    pts.slice(1).forEach(([x, y]) => ctx.lineTo(x, y));
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // fill under
    ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
    ctx.fillStyle = color + '22';
    ctx.fill();
  }, [data, color, width, height]);
  return React.createElement('canvas', { ref, width, height });
}

// ── Auth Screens ───────────────────────────────────────────────────────────

function LoginScreen({ onPartial }) {
  const [email, setEmail] = useState('');
  const [pw, setPw] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  async function submit(e) {
    e.preventDefault(); setErr(''); setLoading(true);
    try { await post('/auth/login', { email, password: pw }); onPartial(email); }
    catch(ex) { setErr(ex.message || 'Login failed'); }
    finally { setLoading(false); }
  }

  return React.createElement('div', { className: 'auth-bg' },
    React.createElement('div', { className: 'auth-box' },
      React.createElement('div', { className: 'auth-logo' },
        React.createElement('div', { className: 'icon' }, '📈'),
        React.createElement('h1', null, 'Trading Journal'),
        React.createElement('p', null, 'Sign in to your account')
      ),
      err && React.createElement('div', { className: 'err-box' }, err),
      React.createElement('form', { onSubmit: submit },
        React.createElement('div', { className: 'field' },
          React.createElement('label', null, 'Email address'),
          React.createElement('input', { type: 'email', value: email, onChange: e => setEmail(e.target.value), placeholder: 'you@example.com', required: true, autoFocus: true })
        ),
        React.createElement('div', { className: 'field' },
          React.createElement('label', null, 'Password'),
          React.createElement('input', { type: 'password', value: pw, onChange: e => setPw(e.target.value), placeholder: '••••••••', required: true })
        ),
        React.createElement('button', { type: 'submit', className: 'auth-btn', disabled: loading }, loading ? 'Signing in…' : 'Continue →')
      )
    )
  );
}

function TOTPScreen({ email, onAuth }) {
  const [code, setCode] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  async function submit(e) {
    e.preventDefault(); setErr(''); setLoading(true);
    try { await post('/auth/totp', { code }); onAuth(email); }
    catch(ex) { setErr(ex.message || 'Invalid code'); setCode(''); }
    finally { setLoading(false); }
  }

  return React.createElement('div', { className: 'auth-bg' },
    React.createElement('div', { className: 'auth-box' },
      React.createElement('div', { className: 'auth-logo' },
        React.createElement('h1', null, 'Two-Factor Auth')
      ),
      React.createElement('div', { className: 'totp-hint' },
        React.createElement('div', { className: 'big' }, '🔐'),
        React.createElement('p', null, 'Open ', React.createElement('strong', null, 'Google Authenticator'), React.createElement('br'), `and enter the 6-digit code for`, React.createElement('br'), React.createElement('strong', null, email))
      ),
      err && React.createElement('div', { className: 'err-box' }, err),
      React.createElement('form', { onSubmit: submit },
        React.createElement('input', {
          className: 'totp-code', value: code, autoFocus: true, inputMode: 'numeric',
          maxLength: 6, placeholder: '000000', required: true,
          onChange: e => setCode(e.target.value.replace(/\D/g,'').slice(0,6))
        }),
        React.createElement('button', { type: 'submit', className: 'auth-btn', disabled: loading || code.length !== 6, style: { marginTop: '16px' } },
          loading ? 'Verifying…' : 'Verify Code')
      )
    )
  );
}

// ── Shared hooks ───────────────────────────────────────────────────────────

function useFetch(url, deps = []) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  useEffect(() => {
    let cancelled = false;
    setLoading(true);
    api(url).then(d => { if (!cancelled) { setData(d); setLoading(false); } })
            .catch(e => { if (!cancelled) { setError(e); setLoading(false); } });
    return () => { cancelled = true; };
  }, deps);
  return { data, loading, error };
}

function Loader() {
  return React.createElement('div', { className: 'loading' },
    React.createElement('div', { className: 'spinner' }),
    React.createElement('span', null, 'Loading…'));
}

function fmt(n, dec = 2) {
  if (n == null) return '—';
  const v = parseFloat(n);
  if (isNaN(v)) return '—';
  return (v >= 0 ? '+' : '') + v.toFixed(dec);
}

function fmtPF(pf) {
  if (pf == null) return '—';
  return parseFloat(pf).toFixed(3);
}

function regimeLabel(r) {
  return (r || 'unknown').replace(/_/g, ' ').toUpperCase();
}

// ── Dashboard page ─────────────────────────────────────────────────────────

function Dashboard({ onNavigate }) {
  const { data: status } = useFetch('/api/status', []);
  const { data: summary } = useFetch('/api/trades/summary', []);
  const { data: regime } = useFetch('/api/regime', []);
  const { data: equity } = useFetch('/api/equity', []);
  const chartRef = useRef(null);
  const chartInstance = useRef(null);

  // Build equity chart
  useEffect(() => {
    if (!equity || !chartRef.current) return;
    const points = equity.points || [];
    const labels = points.map((_, i) => i === 0 ? 'Start' : `#${i}`);

// outcome badge: sl → red, tp → green, time → yellow, manual → grey
function OutcomeBadge({ outcome, reason }) {
  if (!outcome && !reason) return React.createElement('span', { className: 'dim' }, '—');
  const o = (outcome || reason || '').toLowerCase();
  const isTP = o.includes('tp') || o.includes('take');
  const isSL = o.includes('sl') || o.includes('stop') || o.includes('liq');
  const isTime = o.includes('time') || o.includes('expire');
  const color = isTP ? '#3fb950' : isSL ? '#f85149' : isTime ? '#e3b341' : '#8b949e';
  const label = isTP ? 'TP ✓' : isSL ? 'SL ✗' : isTime ? 'TIME' : (outcome || '—').toUpperCase();
  return React.createElement('span', {
    style: { color, fontWeight: 600, fontSize: '11px', whiteSpace: 'nowrap' },
    title: reason || outcome,
  }, label);
}

function Trades() {

function AIChatPage() {
  const [messages, setMessages] = useState([
    { role: 'assistant', content: '👋 Привет! Я знаю всё о твоём боте — текущий режим, стратегии, сделки, Alpaca. Могу анализировать производительность, объяснять что происходит и предлагать действия (включить/выключить рукав, safe mode и т.д.). Что хочешь узнать?' }
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [pendingCmd, setPendingCmd] = useState(null);
  const [cmdConfirm, setCmdConfirm] = useState(false);
  const bottomRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

  async function send(executeCmd = null) {
    const text = input.trim();
    if (!text && !executeCmd) return;
    const userMsg = { role: 'user', content: text };
    const newMsgs = text ? [...messages, userMsg] : messages;
    if (text) { setMessages(newMsgs); setInput(''); }
    setLoading(true);
    try {
      const body = { messages: newMsgs.filter(m => m.role !== 'system') };
      if (executeCmd) body.execute_command = executeCmd;
      const res = await post('/api/ai/chat', body);
      const replies = [];
      if (res.command_result) replies.push({ role: 'system', content: `⚙️ ${res.command_result}` });
      if (res.reply) replies.push({ role: 'assistant', content: res.reply });
      setMessages(prev => [...prev, ...replies]);
      if (res.suggested_command) { setPendingCmd(res.suggested_command); setCmdConfirm(true); }
      else { setPendingCmd(null); setCmdConfirm(false); }
    } catch (e) {
      setMessages(prev => [...prev, { role: 'assistant', content: `❌ Error: ${e.message}` }]);
    } finally { setLoading(false); }
  }

  function confirmCmd() {
    setCmdConfirm(false);
    send(pendingCmd);
    setPendingCmd(null);
  }

  function rejectCmd() {
    setCmdConfirm(false); setPendingCmd(null);
    setMessages(prev => [...prev, { role: 'system', content: '❌ Command cancelled.' }]);
  }

  const quickBtns = [
    'Как работает бот прямо сейчас?',
    'Какой режим рынка и что активно?',
    'Покажи performance по стратегиям',
    'Есть ли проблемы которые надо починить?',
    'Что делает Alpaca?',
  ];

  return React.createElement('div', { style: { display: 'flex', flexDirection: 'column', height: '100%' } },
    React.createElement('div', { className: 'section-title' }, '🤖 AI Assistant'),

    // Chat window
    React.createElement('div', { className: 'card', style: { flex: 1, display: 'flex', flexDirection: 'column', minHeight: 0 } },
      React.createElement('div', { style: { flex: 1, overflowY: 'auto', padding: '4px 0', minHeight: '320px', maxHeight: '500px' } },
        messages.map((m, i) => React.createElement('div', {
          key: i,
          style: {
            display: 'flex', justifyContent: m.role === 'user' ? 'flex-end' : 'flex-start',
            marginBottom: '12px',
          }
        },
          React.createElement('div', {
            style: {
              maxWidth: '80%', padding: '10px 14px', borderRadius: m.role === 'user' ? '12px 12px 2px 12px' : '12px 12px 12px 2px',
              background: m.role === 'user' ? 'var(--blue-dim)' : m.role === 'system' ? 'var(--bg4)' : 'var(--bg3)',
              border: `1px solid ${m.role === 'user' ? 'var(--blue)' : m.role === 'system' ? 'var(--border2)' : 'var(--border)'}`,
              color: m.role === 'system' ? 'var(--text2)' : 'var(--text)',
              fontSize: '13px', lineHeight: '1.6', whiteSpace: 'pre-wrap',
            }
          }, m.content)
        )),
        loading && React.createElement('div', { style: { display: 'flex', gap: '4px', padding: '10px 14px' } },
          [0,1,2].map(i => React.createElement('div', { key: i, style: {
            width: '6px', height: '6px', borderRadius: '50%', background: 'var(--text3)',
            animation: `pulse 1.2s ease-in-out ${i*0.2}s infinite`
          } }))
        ),
        React.createElement('div', { ref: bottomRef })
      ),

      // Pending command confirmation
      cmdConfirm && pendingCmd && React.createElement('div', {
        style: { background: 'var(--yellow-dim)', border: '1px solid var(--yellow)', borderRadius: 'var(--radius)', padding: '12px 14px', margin: '8px 0' }
      },
        React.createElement('div', { style: { fontSize: '12px', color: 'var(--yellow)', fontWeight: 600, marginBottom: '6px' } }, '⚠️ AI suggests this action — confirm?'),
        React.createElement('code', { style: { fontSize: '12px', color: 'var(--text)' } }, JSON.stringify(pendingCmd)),
        React.createElement('div', { style: { display: 'flex', gap: '8px', marginTop: '10px' } },
          React.createElement('button', { className: 'auth-btn', style: { width: 'auto', padding: '6px 16px', background: 'var(--green)', fontSize: '13px' }, onClick: confirmCmd }, '✓ Execute'),
          React.createElement('button', { className: 'auth-btn', style: { width: 'auto', padding: '6px 16px', background: 'var(--red-dim)', border: '1px solid var(--red)', fontSize: '13px' }, onClick: rejectCmd }, '✗ Cancel')
        )
      ),

      // Quick buttons
      React.createElement('div', { style: { display: 'flex', gap: '6px', flexWrap: 'wrap', padding: '10px 0 6px' } },
        quickBtns.map(q => React.createElement('button', {
          key: q, onClick: () => { setInput(q); },
          style: { background: 'var(--bg4)', border: '1px solid var(--border2)', color: 'var(--text2)', padding: '4px 10px', borderRadius: '14px', cursor: 'pointer', fontSize: '11px' }
        }, q))
      ),

      // Input
      React.createElement('div', { style: { display: 'flex', gap: '8px', marginTop: '8px' } },
        React.createElement('input', {
          value: input,
          onChange: e => setInput(e.target.value),
          onKeyDown: e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } },
          placeholder: 'Спроси что угодно о боте…',
          disabled: loading,
          style: {
            flex: 1, background: 'var(--bg3)', border: '1px solid var(--border2)', color: 'var(--text)',
            padding: '10px 14px', borderRadius: 'var(--radius)', fontSize: '13px', outline: 'none',
          }
        }),
        React.createElement('button', {
          onClick: () => send(), disabled: loading || !input.trim(),
          style: { background: 'var(--blue)', border: 'none', color: '#fff', padding: '10px 16px', borderRadius: 'var(--radius)', cursor: 'pointer', fontSize: '13px', fontWeight: 600, opacity: loading || !input.trim() ? 0.5 : 1 }
        }, '→')
      )
    )
  );
}

}
